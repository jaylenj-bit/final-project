<title>Cosmic Phenomena</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #edf6ff;
      background:
        radial-gradient(circle at 10% 20%, rgba(0, 174, 255, 0.2), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(162, 0, 255, 0.16), transparent 24%),
        radial-gradient(circle at 60% 85%, rgba(255, 0, 128, 0.1), transparent 20%),
        linear-gradient(180deg, #02040d 0%, #08101f 50%, #040814 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(2px 2px at 40px 60px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 180px 120px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 350px 90px, rgba(173,216,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 500px 220px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 700px 100px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 900px 180px, rgba(173,216,255,0.75), transparent),
        radial-gradient(2px 2px at 1100px 80px, rgba(255,255,255,0.85), transparent);
      background-size: 1200px 600px;
      animation: drift 8s linear infinite;
      opacity: 0.6;
    }

    body::after {
      background:
        radial-gradient(circle at 25% 40%, rgba(0, 200, 255, 0.09), transparent 16%),
        radial-gradient(circle at 75% 30%, rgba(183, 0, 255, 0.1), transparent 16%);
      filter: blur(12px);
    }

    @keyframes drift {
      0% { transform: translateY(0); opacity: 0.45; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-12px); opacity: 0.45; }
    }

    header {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(rgba(2, 8, 24, 0.58), rgba(2, 8, 24, 0.75)),
        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
      color: white;
      padding: 110px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(0, 183, 255, 0.18), transparent 70%);
      left: -90px;
      top: -80px;
      border-radius: 50%;
      filter: blur(8px);
    }

    header::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, rgba(198, 63, 255, 0.2), transparent 70%);
      right: -80px;
      bottom: -100px;
      border-radius: 50%;
      filter: blur(16px);
    }

    header h1 {
      position: relative;
      z-index: 1;
      font-size: 3.2rem;
      margin-bottom: 12px;
      text-shadow: 0 0 15px rgba(255,255,255,0.15), 0 0 30px rgba(0,183,255,0.18);
    }

    header p {
      position: relative;
      z-index: 1;
      font-size: 1.15rem;
      max-width: 760px;
      margin: 0 auto;
      color: #d8ebff;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 16px 20px;
      background: rgba(4, 10, 24, 0.72);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    nav a {
      color: #c8ebff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      transition: 0.3s ease;
    }

    nav a:hover {
      color: white;
      background: rgba(0, 183, 255, 0.11);
      border-color: rgba(0, 183, 255, 0.28);
      transform: translateY(-2px);
      box-shadow: 0 0 16px rgba(0, 183, 255, 0.2);
    }

    .section {
      position: relative;
      z-index: 1;
      padding: 70px 20px 80px;
      max-width: 1250px;
      margin: auto;
    }

    .section h2 {
      font-size: 2.4rem;
      color: #9de0ff;
      text-align: center;
      margin-bottom: 18px;
      text-shadow: 0 0 16px rgba(0,183,255,0.2);
    }

    .section-intro {
      max-width: 820px;
      margin: 0 auto 45px;
      text-align: center;
      color: #c7d8ea;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .animal-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border: 1px solid rgba(149, 214, 255, 0.12);
      backdrop-filter: blur(12px);
      box-shadow:
        0 12px 38px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.07);
      transition: 0.35s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,183,255,0.08), transparent 40%, rgba(166, 0, 255, 0.08));
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(0, 183, 255, 0.35);
      box-shadow:
        0 18px 45px rgba(0,0,0,0.38),
        0 0 25px rgba(0, 183, 255, 0.14);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      position: relative;
      z-index: 1;
      padding: 22px;
    }

    .card-content h3 {
      color: #91dcff;
      margin-bottom: 12px;
      font-size: 1.35rem;
      text-shadow: 0 0 10px rgba(0,183,255,0.15);
    }

    .card-content p {
      color: #dce9f7;
      font-size: 0.97rem;
      line-height: 1.65;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      color: #b4c8dc;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.12);
    }

    @media (max-width: 768px) {
      header {
        padding: 90px 18px;
      }

      header h1 {
        font-size: 2.35rem;
      }

      .section h2 {
        font-size: 2rem;
      }

      nav {
        flex-wrap: wrap;
      }
    }
  </style>
<body>

<header>
  <h1>Cosmic Phenomena</h1>
  <p>The forces shaping the universe</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="animals.html">Space Objects</a>
  <a href="plants.html">Phenomena</a>
</nav>

<section class="section">

  <div class="card">
    <h3>Supernova</h3>
    <p>Explosive death of a star releasing immense energy.</p>
  </div>

  <div class="card">
    <h3>Dark Matter</h3>
    <p>Invisible matter that makes up most of the universe's mass.</p>
  </div>

  <div class="card">
    <h3>Gravitational Waves</h3>
    <p>Ripples in spacetime caused by massive cosmic events.</p>
  </div>

</section>

</body>
</html>
